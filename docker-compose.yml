services:
  postgres:
    image: postgres:16
    container_name: techtrend-postgres
    environment:
      POSTGRES_DB: techtrend
      POSTGRES_USER: techtrend
      POSTGRES_PASSWORD: techtrend
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U techtrend -d techtrend"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
